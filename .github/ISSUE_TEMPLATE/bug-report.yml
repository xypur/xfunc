name: Bug Report
description: File a bug report to help us improve
title: '[Bug]: '
labels: ['bug']
body:
  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
      description: Steps to reproduce the behavior
      placeholder: |
        1. Import '...'
        2. Call '...'
        3. See error
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    attributes:
      label: Package Version
      description: Which version of xfunc are you using?
      placeholder: e.g. 0.7.0
    validations:
      required: true
  - type: input
    attributes:
      label: Runtime
      description: Which runtime and version? (Node.js, Deno, Bun, browser)
      placeholder: e.g. Node.js 20.10.0
  - type: textarea
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
